<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro - Gestor Safira</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="card auth-card">
            <h2>Começar Agora</h2>
            <form action="dashboard.html">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" placeholder="João Silva" required>
                </div>
                <div class="form-group">
                    <label>E-mail de Trabalho</label>
                    <input type="email" placeholder="joao@empresa.com" required>
                </div>
                <div class="form-group">
                    <label>Crie uma Senha</label>
                    <input type="password" placeholder="Mínimo 8 caracteres" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>
            </form>
            <p class="footer-text">Já é membro? <a href="login.html"
                    style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Faça login</a></p>
        </div>
    </div>
</body>

</html>
